# check_colloquial.py: 口語表現検出（writing-standardsスキル付属）
# ホスト circe / circe-container でのみ有効化される
# （配布制御は ~/dotfiles/.chezmoi-source/.chezmoiignore で行う）
[tool.pyfltr.custom-commands.colloquial]
type = "linter"
path = "uv"
args = [
    "run",
    "--script",
    "~/dotfiles/agent-toolkit/skills/writing-standards/scripts/check_colloquial.py",
]
targets = ["*"]
error-pattern = '^(?P<file>[^:]+):(?P<line>\d+):(?P<col>\d+) \[(?P<rule>[^\]]+)\] (?P<message>.+)$'
severity = "warning"
hints = [
    "Colloquial Japanese expressions detected. Replace with formal written-language equivalents.",
    "See ~/dotfiles/agent-toolkit/skills/writing-standards/SKILL.md for guidance.",
]
