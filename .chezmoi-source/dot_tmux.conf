# tmux.conf
#
# Windows Terminal -> OpenSSH -> Linux(bash) -> tmuxという経路を主に想定する。
#

##### 基本 #####

set -g status-interval 1
set -g status-position top
set -g history-limit 100000

# tmux 3.2 以降向け。
# Linux 側に tmux-256color の terminfo が入っている前提。
set -g default-terminal "tmux-256color"

# Windows OpenSSH -> Linux -> tmux 前提。
# 外側端末が xterm 系として認識される場合に、True Color と OSC 52 clipboard を有効化する。
set -as terminal-features ",xterm*:RGB:clipboard"

# tmux の入れ子で外側端末が tmux 系として認識される場合に、True Color と OSC 52 clipboard を有効化する。
set -as terminal-features ",tmux*:RGB:clipboard"

# tmux 自身のコピーと、tmux 内アプリからの OSC 52 を外側へ通す。
# Windows Terminal 側で OSC 52 clipboard が無効化されている場合は機能しない。
set -g set-clipboard on

# タイトル
set -g set-titles on
set -g set-titles-string "#T"

# マウス
set -g mouse on

# Claude Code / vim / nvim など、フォーカス検知を使う TUI 向け
set -g focus-events on


##### キーバインド #####

unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"


##### コピー操作 #####

setw -g mode-keys vi

# set-clipboard on + terminal-features clipboard に任せる。
# 自前で OSC 52 を組み立てて copy-pipe する必要はない。

# Prefix + [ -> v で選択 -> y で Windows 側クリップボードへコピー
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Enter でもコピー
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel

# マウスドラッグ終了時もコピー
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel


##### ステータスライン #####

# tmux-plugins/tpm 経由で catppuccin テーマと tmux-cpu を導入する。
# TPM・catppuccin・tmux-cpu プラグインは pytools/_internal/setup_tmux_plugins.py が
# `chezmoi apply` 後処理で自動インストール・更新する。
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "catppuccin/tmux#v2.3.0"
set -g @plugin "tmux-plugins/tmux-cpu"

set -g @catppuccin_status_background "#313244"
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"

# catppuccin と tmux-cpu の変数定義をロードしてから status-left/right を設定する。
run "~/.tmux/plugins/tmux/catppuccin.tmux"
run "~/.tmux/plugins/tmux-cpu/cpu.tmux"

set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right ""
# session モジュールは内部に #S を含むため、ランタイム評価させるよう -agF ではなく -ag を使う。
set -ag  status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#[fg=#{@thm_fg}] %Y-%m-%d %H:%M "

run "~/.tmux/plugins/tpm/tpm"
