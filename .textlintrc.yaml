rules:
  preset-ja-technical-writing:
    # 引用文や詳細な技術説明で 100 文字超過が避けられない場合があるため緩める
    sentence-length:
      max: 120
  preset-jtf-style:
    # 規則 2: 日本語中の半角括弧を全角にする
    "4.3.1.丸かっこ（）": true
    "4.3.2.大かっこ［］": true
    "4.3.3.かぎかっこ「」": true
    "4.3.4.二重かぎかっこ『』": true
    # 規則 3: 全角文字と半角文字の間にスペースを入れない (JTF 3.1.1 原則)
    "3.1.1.全角文字と半角文字の間": true
    # 本計画では導入しないルールは明示的に無効化する。
    # preset-jtf-style のデフォルトが広範なため、導入範囲を限定するために必要。
    "1.1.1.本文": false
    "1.1.2.見出し": false
    "1.1.3.箇条書き": false
    "1.1.5.図表のキャプション": false
    "1.2.1.句点(。)と読点(、)": false
    "1.2.2.ピリオド(.)とカンマ(,)": false
    "2.1.8.算用数字": false
    "2.1.9.アルファベット": false
    "2.1.10.算用数字の位取りの表記": false
    "3.1.2.全角文字どうし": false
    "3.2.カタカナ語間のスペースの有無": false
    "3.3.かっこ類と隣接する文字の間のスペースの有無": false
    "4.1.1.句点(。)": false
    "4.1.3.ピリオド(.)、カンマ(,)": false
    "4.2.1.感嘆符(！)": false
    "4.2.2.疑問符(？)": false
    "4.2.4.中黒(・)": false
    "4.2.5.波線(〜)": false
    "4.2.6.ハイフン(-)": false
    "4.2.7.コロン(：)": false
    "4.2.8.セミコロン(;)": false
    "4.2.9.ダッシュ(-)": false
    "4.3.5.二重引用符": false
    "4.3.6.中かっこ{ }": false
    "4.3.7.山かっこ<>": false
    "4.3.8.一重引用符": false
  prh:
    # 規則 4: 外来語の語尾長音 (prh.yml 参照)
    rulePaths:
      - "./prh.yml"
