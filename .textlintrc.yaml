rules:
  preset-ja-technical-writing:
    # 引用文や詳細な技術説明で100文字超過が避けられない場合があるため緩める
    sentence-length:
      max: 120
  preset-jtf-style:
    # preset-jtf-style のデフォルトは (辞書ベースルールを除き) ほぼ全て true。
    # 本リポジトリはデフォルトを基本採用し、以下の誤検知・実務支障があるルールのみ無効化する。
    "3.2.カタカナ語間のスペースの有無": false  # "サーバ1台" 等の複合パターンに誤検知するため
    "3.3.かっこ類と隣接する文字の間のスペースの有無": false  # 英文脈の "Python (CPython 3.12)" 等と衝突するため
    "4.2.4.中黒(・)": false  # カタカナ複合語絡みで誤検知の恐れがあるため
    "4.2.6.ハイフン(-)": false  # 和文中の半角ハイフン使用例が多いため
    "4.2.7.コロン(：)": false  # "例: ..." 記法を多用するため
  prh:
    rulePaths:
      - "./prh.yml"
