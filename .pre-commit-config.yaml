repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # テキストフォーマット
      - id: trailing-whitespace
        exclude: '\.cmd$'
      - id: end-of-file-fixer
        exclude: '\.cmd$'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(cmd|ps1)(\.tmpl)?$'
      - id: fix-byte-order-marker
        # Windows PowerShell 5.1 は BOM の無い .ps1 を ANSI (日本語環境では Shift-JIS)
        # として読んでしまい日本語文字列でパースエラーになるため、.ps1 / .ps1.tmpl の
        # BOM は削らず保持する。
        exclude: '\.(cmd|ps1)(\.tmpl)?$'
      # シンタックス検証
      - id: check-yaml
        exclude: '\.tmpl$'
      - id: check-json
        exclude: '(^|/)modify_|environment\.json$'
      - id: check-toml
        exclude: '\.tmpl$'
      - id: check-ast
      # セキュリティ
      - id: detect-private-key
      # ファイル検証
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: '\.tmpl$'
      - id: check-merge-conflict
      - id: check-case-conflict
      # Python
      - id: debug-statements

  - repo: local
    hooks:
      - id: check-cmd-encoding
        name: Check .cmd files CP932 encoding
        entry: scripts/check-cmd-encoding.sh
        language: script
        pass_filenames: false
        files: '\.cmd$'
      - id: check-templates
        name: chezmoi template check
        entry: scripts/check-templates.sh
        language: script
        files: '\.(sh|ps1)\.tmpl$'
        pass_filenames: true
      - id: require-ps1-bom
        name: Require UTF-8 BOM on .ps1 files
        entry: scripts/check-ps1-bom.sh
        language: script
        files: '\.ps1(\.tmpl)?$'
        pass_filenames: true
      - id: powershell-analyzer
        name: PSScriptAnalyzer
        entry: scripts/run-psscriptanalyzer.sh
        language: script
        files: '\.ps1$'
        exclude: '\.tmpl$'
        pass_filenames: true
      - id: pyfltr
        name: pyfltr
        entry: uv run --frozen pyfltr fast
        types_or: [python, markdown, toml, shell, bash]
        require_serial: true
        language: system
