name: CI
on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: dotfiles
      - name: ~/dotfilesに配置
        run: mv dotfiles ~/dotfiles
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: PowerShell + PSScriptAnalyzerインストール
        run: |
          sudo apt-get update
          sudo apt-get install --yes wget apt-transport-https software-properties-common
          source /etc/os-release
          wget --quiet "https://packages.microsoft.com/config/ubuntu/$VERSION_ID/packages-microsoft-prod.deb"
          sudo dpkg --install packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install --yes powershell
          pwsh -NoProfile -Command "Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck"
      - name: chezmoiインストール
        run: |
          sh -c "$(curl -fsSL get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: install.sh実行
        run: ~/dotfiles/install.sh
      - name: 主要ファイルの存在確認
        run: |
          test -f ~/.bashrc
          test -f ~/.vimrc
          test -f ~/.claude/CLAUDE.md
          test -f ~/.ssh/config
          test -x ~/bin/update-dotfiles

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: dotfiles
      - name: ~/dotfilesに配置
        shell: bash
        run: mv dotfiles ~/dotfiles
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: chezmoiインストール
        shell: bash
        run: sh -c "$(curl -fsSL get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: chezmoi適用
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --source ~/dotfiles --apply
      - name: dotfiles-post-applyの動作確認
        shell: pwsh
        run: dotfiles-post-apply
      - name: 主要ファイルの存在確認
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.claude\CLAUDE.md")) { exit 1 }
          if (-not (Test-Path "$env:USERPROFILE\.ssh\authorized_keys")) { exit 1 }
          if (-not (Test-Path "$env:USERPROFILE\bin\update-dotfiles.cmd")) { exit 1 }

  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      # 開発モード: DeprecationWarningなどの隠れた問題を早期検出する
      PYTHONDEVMODE: "1"
      # サプライチェーン攻撃対策: uvがlockfileを常に尊重する
      UV_FROZEN: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: GitHub Actionsのピン留め検証
        run: |
          go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.9.0
          GOPATH_BIN="$(go env GOPATH)/bin"
          export PATH="$GOPATH_BIN:$PATH"
          pinact run --check
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: latest

      - name: Configure pnpm security
        run: pnpm config set minimum-release-age 1440 --global

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}
          restore-keys: pnpm-store-${{ runner.os }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Test with pyfltr
        env:
          # chezmoi-applyはローカルコミット時専用のpre-commit hookなのでCIではスキップ
          SKIP: chezmoi-apply
        run: uv run pyfltr ci

      - name: Prune uv cache for CI
        run: uv cache prune --ci
