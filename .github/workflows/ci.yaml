name: CI
on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: dotfiles
      - name: ~/dotfiles に配置
        run: mv dotfiles ~/dotfiles
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: PowerShell + PSScriptAnalyzer インストール
        run: make -C "$HOME/dotfiles" setup-pwsh
      - name: chezmoi インストール
        run: |
          sh -c "$(curl -fsSL get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: install.sh 実行
        run: ~/dotfiles/install.sh
      - name: 主要ファイルの存在確認
        run: |
          test -f ~/.bashrc
          test -f ~/.vimrc
          test -f ~/.claude/rules/agent-toolkit/agent.md
          test -f ~/.ssh/config
          # shellcheck disable=SC2016 # .bashrc内に格納される$HOMEをシェル変数ではなく文字列リテラルとして検索する
          grep -qF '$HOME/dotfiles/bin' ~/.bashrc

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: dotfiles
      - name: ~/dotfiles に配置
        # Windows runnerはチェックアウト先（D:）と $env:USERPROFILE（C:）が別ボリュームのため、
        # GNU mvでクロスドライブ移動するとシンボリックリンクの再作成に失敗する。
        # robocopyの /SL でsymlinkを保持しつつコピーし、元ディレクトリを削除して移動を実現する。
        shell: pwsh
        run: |
          $src = "$env:GITHUB_WORKSPACE\dotfiles"
          $dst = "$env:USERPROFILE\dotfiles"
          robocopy $src $dst /E /SL /COPY:DAT /NFL /NDL /NJH /NJS
          $rc = $LASTEXITCODE
          if ($rc -ge 8) { exit $rc }
          Remove-Item -Recurse -Force $src
          exit 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: chezmoi インストール
        shell: bash
        run: sh -c "$(curl -fsSL get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: chezmoi 適用
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --source=~/dotfiles --apply
      - name: dotfiles-post-apply の動作確認
        shell: pwsh
        run: dotfiles-post-apply
      - name: 主要ファイルの存在確認
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.claude\rules\agent-toolkit\agent.md")) { exit 1 }
          if (-not (Test-Path "$env:USERPROFILE\.ssh\authorized_keys")) { exit 1 }
          $envKey = [Microsoft.Win32.Registry]::CurrentUser.OpenSubKey('Environment')
          if ($null -eq $envKey) { exit 1 }
          try {
            $pathValue = $envKey.GetValue('Path', $null, [Microsoft.Win32.RegistryValueOptions]::DoNotExpandEnvironmentNames)
            $pathKind = $envKey.GetValueKind('Path')
          } finally {
            $envKey.Close()
          }
          if ($pathValue -notlike '*%USERPROFILE%\dotfiles\bin*') { exit 1 }
          if ($pathKind -ne [Microsoft.Win32.RegistryValueKind]::ExpandString) { exit 1 }

  python-lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ak110/pyfltr:latest
      # repack-archive の PDF 入力テストで pdftoppm を使うため、apt 導入用に root で実行する
      # （既定ユーザーは非 root・sudo 無し）
      options: --user root
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        python-version: [ "3.12", "3.13", "3.14" ]
    env:
      # 開発モード: DeprecationWarning などの隠れた問題を早期検出する
      PYTHONDEVMODE: "1"
      # サプライチェーン攻撃対策: uv が lockfile を常に尊重する
      UV_FROZEN: "1"
      UV_PYTHON: ${{ matrix.python-version }}
      # mise・pinact 等が GitHub API を呼び出す際のレート制限（403）回避。
      # container job では明示しないと secrets.GITHUB_TOKEN がコンテナへ渡らない
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: safe.directory の設定
        # --user root 実行のためワークスペース所有者（UID 1001）と実行ユーザーが不一致になり、
        # pre-commit 等の git 操作が dubious ownership で停止する。safe.directory へ追加して回避する。
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: GitHub Actions のピン留め検証
        run: pinact run --check

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /cache
          key: pyfltr-cache-${{ runner.os }}-py${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Poppler インストール
        # repack-archive の PDF 入力テストが pdftoppm を必要とする
        run: |
          apt-get update
          apt-get install -y --no-install-recommends poppler-utils

      - name: Test with pyfltr
        env:
          # chezmoi-apply はローカルコミット時専用の pre-commit hook であるため CI ではスキップする
          # claude-plugin-validate は claude CLI が必要で CI 環境への導入は pnpm/npm の
          # minimum-release-age 機構とメタデータ欠落で安定せず現実的でないためスキップする
          SKIP: chezmoi-apply,claude-plugin-validate
        run: pyfltr ci

      - name: Prune uv cache for CI
        run: uv cache prune --ci
