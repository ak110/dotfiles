name: test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dotfiles
      - name: ~/dotfilesに配置
        run: mv dotfiles ~/dotfiles
      - name: .cmdファイルのCP932エンコーディング検証
        run: ~/dotfiles/bin/executable_check-cmd-encoding ~/dotfiles
      - name: install.sh実行
        run: ~/dotfiles/install.sh
      - name: 主要ファイルの存在確認
        run: |
          test -f ~/.bashrc
          test -f ~/.vimrc
          test -f ~/.claude/CLAUDE.md
          test -f ~/.ssh/config
          test -x ~/bin/update-dotfiles
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dotfiles
      - name: ~/dotfilesに配置
        shell: bash
        run: mv dotfiles ~/dotfiles
      - name: chezmoiインストール
        shell: bash
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: chezmoi適用
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --source ~/dotfiles --apply
      - name: 主要ファイルの存在確認
        shell: pwsh
        run: |
          if (-not (Test-Path "$HOME\.claude\CLAUDE.md")) { exit 1 }
          if (-not (Test-Path "$HOME\.ssh\authorized_keys")) { exit 1 }
          if (-not (Test-Path "$HOME\bin\update-dotfiles.cmd")) { exit 1 }
