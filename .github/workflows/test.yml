name: test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dotfiles
      - name: Move to ~/dotfiles
        run: mv dotfiles ~/dotfiles
      - name: Run install.sh
        run: ~/dotfiles/install.sh
      - name: Verify key files exist
        run: |
          test -f ~/.bashrc
          test -f ~/.vimrc
          test -f ~/.claude/CLAUDE.md
          test -f ~/.ssh/config
          test -x ~/bin/update-dotfiles
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dotfiles
      - name: Move to ~/dotfiles
        shell: bash
        run: mv dotfiles ~/dotfiles
      - name: Install chezmoi
        shell: bash
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Apply chezmoi
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --source ~/dotfiles --apply
      - name: Verify key files exist
        shell: pwsh
        run: |
          if (-not (Test-Path "$HOME\.claude\CLAUDE.md")) { exit 1 }
          if (-not (Test-Path "$HOME\.ssh\authorized_keys")) { exit 1 }
          if (-not (Test-Path "$HOME\bin\update-dotfiles.cmd")) { exit 1 }
