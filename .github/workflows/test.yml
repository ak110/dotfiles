name: test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: dotfiles
      - name: ~/dotfilesに配置
        run: mv dotfiles ~/dotfiles
      - uses: astral-sh/setup-uv@v7
      - name: pre-commitによるチェック
        run: |
          cd ~/dotfiles
          uv sync --frozen --all-groups
          SKIP=pyfltr uv run pre-commit run --all-files
      - name: install.sh実行
        run: ~/dotfiles/install.sh
      - name: 主要ファイルの存在確認
        run: |
          test -f ~/.bashrc
          test -f ~/.vimrc
          test -f ~/.claude/CLAUDE.md
          test -f ~/.ssh/config
          test -x ~/bin/update-dotfiles

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: dotfiles
      - name: ~/dotfilesに配置
        shell: bash
        run: mv dotfiles ~/dotfiles
      - uses: astral-sh/setup-uv@v7
      - name: chezmoiインストール
        shell: bash
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: chezmoi適用
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --source ~/dotfiles --apply
      - name: update-claude-settingsの動作確認
        shell: pwsh
        run: update-claude-settings
      - name: 主要ファイルの存在確認
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.claude\CLAUDE.md")) { exit 1 }
          if (-not (Test-Path "$env:USERPROFILE\.ssh\authorized_keys")) { exit 1 }
          if (-not (Test-Path "$env:USERPROFILE\bin\update-dotfiles.cmd")) { exit 1 }

  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      PYTHONDEVMODE: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run pyfltr .
      - run: uv cache prune --ci
