[project]
name = "pytools"
version = "0.1.0"
description = "Personal command-line tools"
requires-python = ">=3.12"
dependencies = [
    "bashplotlib",
    "businesstimedelta",
    "holidays",
    "httpx",
    "libarchive-c",
    "natsort",
    "numpy",
    "pdf2image",
    "pillow",
    "psutil",
    "pydantic>=2",
    "pyyaml",
    "send2trash",
    "tqdm",
    "zstandard",
]

[project.optional-dependencies]
repack-png = ["wand"]

[project.scripts]
claudize = "pytools.claudize:_main"
py-imageconverter = "pytools.imageconverter:_main"
py-rename = "pytools.rename:_main"
py-rmdirs = "pytools.rmdirs:_main"
py-pdf-to-image = "pytools.pdf_to_image:_main"
check-image-sizes = "pytools.check_image_sizes:_main"
git-justify = "pytools.git_justify:_main"
mvdir = "pytools.mvdir:_main"
update-ssh-config = "pytools.update_ssh_config:_main"
dotfiles-post-apply = "pytools.post_apply:_main"
date-relocator = "pytools.date_relocator:_main"
clonedir = "pytools.clonedir:_main"
delete-homonym = "pytools.delete_homonym:_main"
dirsize = "pytools.dirsize:_main"
randfile = "pytools.randfile:_main"
rename2hash = "pytools.rename2hash:_main"
psgrep = "pytools.psgrep:_main"
reg-export = "pytools.reg_export:_main"
run-as-admin = "pytools.run_as_admin:_main"
repack-archive = "pytools.repack_archive:_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pre-commit>=4.2.0",
    "pyfltr>=1.23.0",
    "pytest-xdist>=3.8.0",
    "types-PyYAML",
]

[tool.pyfltr]
preset = "latest"
pyright = true
ty = true
shellcheck = true
shfmt = true
extend-exclude = ["*/profile_ipy/*", "*.cmd"]
shfmt-extend-targets = ["*.sh.tmpl", "dot_bashrc", "dot_bash_profile", "executable_*"]
shellcheck-extend-targets = ["dot_bashrc", "dot_bash_profile", "executable_*"]
textlint-packages = [
    "textlint-rule-preset-ja-technical-writing",
    "textlint-rule-preset-jtf-style",
    "textlint-rule-ja-no-abusage",
    "textlint-rule-prh",
]

[tool.ruff]
line-length = 128

[tool.ruff.lint]
select = ["D", "E", "F", "UP", "B", "SIM", "ICN", "I"]
ignore = ["D107", "D415"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**_test.py" = ["D"]
"**/__init__.py" = ["D104"]

[tool.mypy]
allow_redefinition = true
check_untyped_defs = true
ignore_missing_imports = true
strict_optional = true
strict_equality = true
warn_no_return = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true

[tool.pytest.ini_options]
addopts = "--showlocals -p no:cacheprovider --maxfail=5 -n auto --dist=loadfile"
asyncio_default_fixture_loop_scope = "function"
log_level = "DEBUG"
xfail_strict = true
