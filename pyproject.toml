[project]
name = "pytools"
version = "0.1.0"
description = "Personal command-line tools"
requires-python = ">=3.12"
dependencies = [
    "bashplotlib",
    "businesstimedelta",
    "holidays",
    "natsort",
    "numpy",
    "pdf2image",
    "pillow",
    "tqdm",
]

[project.optional-dependencies]
repack-png = ["wand"]

[project.scripts]
claudize = "pytools.claudize:_main"
py-imageconverter = "pytools.imageconverter:_main"
py-rename = "pytools.rename:_main"
py-rmdirs = "pytools.rmdirs:_main"
py-pdf-to-image = "pytools.pdf_to_image:_main"
check-image-sizes = "pytools.check_image_sizes:_main"
git-justify = "pytools.git_justify:_main"
mvdir = "pytools.mvdir:_main"
update-claude-settings = "pytools.update_claude_settings:_main"
update-ssh-config = "pytools.update_ssh_config:_main"
update-npmrc = "pytools.update_npmrc:_main"
dotfiles-post-apply = "pytools.post_apply:_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pre-commit>=4.2.0",
    "pyfltr>=1.15.1",
]

[tool.pyfltr]
preset = "latest"
pyright = true
ty = true
extend-exclude = ["dot_*"]

[tool.ruff]
line-length = 128
extend-exclude = ["dot_*"]

[tool.ruff.lint]
select = ["D", "E", "F", "UP", "B", "SIM", "ICN", "I"]
ignore = ["D107", "D415"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**_test.py" = ["D"]
"**/__init__.py" = ["D104"]

[tool.mypy]
exclude = ["dot_"]
allow_redefinition = true
check_untyped_defs = true
ignore_missing_imports = true
strict_optional = true
strict_equality = true
warn_no_return = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true

[tool.pytest.ini_options]
addopts = "--showlocals -p no:cacheprovider --maxfail=5"
asyncio_default_fixture_loop_scope = "function"
log_level = "DEBUG"
xfail_strict = true
