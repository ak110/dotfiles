# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Windows 向けレジストリ設定を winget configure で宣言的に管理する。
# 適用は `pytools/_internal/setup_winget_dsc.py` が post_apply から呼ぶ。
properties:
  configurationVersion: 0.2.0
  assertions: []
  resources:
    - resource: PSDscResources/Registry
      directives:
        description: Explorer の拡張子表示を有効化する
        allowPrerelease: true
      settings:
        Key: HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: HideFileExt
        ValueType: Dword
        ValueData: 0
        Ensure: Present
    - resource: PSDscResources/Registry
      directives:
        description: タスクバーの検索ボックスを最小化する
        allowPrerelease: true
      settings:
        Key: HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Search
        ValueName: SearchboxTaskbarMode
        ValueType: Dword
        ValueData: 0
        Ensure: Present
    - resource: PSDscResources/Registry
      directives:
        description: 新規ショートカット作成時に「～へのショートカット」を付けない
        allowPrerelease: true
      settings:
        Key: HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Explorer
        ValueName: link
        ValueType: Dword
        ValueData: 0
        Ensure: Present
    - resource: PSDscResources/Registry
      directives:
        description: フォルダータイプの自動認識を無効にする
        allowPrerelease: true
      settings:
        Key: HKEY_CURRENT_USER\Software\Classes\Local Settings\Software\Microsoft\Windows\Shell\Bags\AllFolders\Shell
        ValueName: FolderType
        ValueType: String
        ValueData: NotSpecified
        Ensure: Present
